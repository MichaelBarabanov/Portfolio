  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="#2f81f7"/>

  <!-- Terminal prompt line -->
  <text x="72" y="188" font-family="'Courier New',monospace" font-size="20" fill="#3fb950">$ whoami</text>

  <!-- Name – main heading -->
  <text x="70" y="290" font-family="'Courier New',Courier,monospace" font-size="78" font-weight="900" fill="#e6edf3" letter-spacing="-2">MICHAEL BARABANOV</text>

  <!-- Glitch accent layers (static simulation) -->
  <text x="72" y="290" font-family="'Courier New',Courier,monospace" font-size="78" font-weight="900" fill="#ff2d78" opacity="0.25" letter-spacing="-2" clip-path="inset(0 0 62% 0)">MICHAEL BARABANOV</text>
  <text x="68" y="290" font-family="'Courier New',Courier,monospace" font-size="78" font-weight="900" fill="#00ffe5" opacity="0.2" letter-spacing="-2" clip-path="inset(62% 0 0 0)">MICHAEL BARABANOV</text>

