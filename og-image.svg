  <text x="110" y="474" font-family="'Courier New',monospace" font-size="15" fill="#3fb950">Available for Hire</text>

  <!-- URL / domain placeholder -->
  <text x="72" y="570" font-family="'Courier New',monospace" font-size="16" fill="#30363d">michaelbarabanov.dev</text>

  <!-- Right side: decorative terminal window -->
