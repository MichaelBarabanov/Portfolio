  <text x="858" y="310" font-family="'Courier New',monospace" font-size="13" fill="#e6edf3">whoami</text>
  <text x="840" y="336" font-family="'Courier New',monospace" font-size="12" fill="#58a6ff">Michael Barabanov</text>
  <text x="840" y="356" font-family="'Courier New',monospace" font-size="12" fill="#8b949e">20 · Koblenz · PHP</text>
  <text x="840" y="376" font-family="'Courier New',monospace" font-size="12" fill="#8b949e">Shopware 6 · MySQL</text>
  <text x="840" y="406" font-family="'Courier New',monospace" font-size="13" fill="#3fb950">$ </text>
  <rect x="858" y="394" width="8" height="16" fill="#2f81f7" opacity="0.9"/>
