  <text x="240" y="418" font-family="'Courier New',monospace" font-size="18" fill="#30363d">·</text>
  <text x="262" y="418" font-family="'Courier New',monospace" font-size="18" fill="#8b949e">PHP</text>
  <text x="316" y="418" font-family="'Courier New',monospace" font-size="18" fill="#30363d">·</text>
  <text x="336" y="418" font-family="'Courier New',monospace" font-size="18" fill="#8b949e">Shopware 6</text>
  <text x="494" y="418" font-family="'Courier New',monospace" font-size="18" fill="#30363d">·</text>
  <text x="514" y="418" font-family="'Courier New',monospace" font-size="18" fill="#8b949e">MySQL</text>

