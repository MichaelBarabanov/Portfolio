  <!-- terminal bar -->
  <rect x="820" y="120" width="320" height="36" rx="8" fill="#21262d"/>
  <rect x="820" y="144" width="320" height="12" fill="#21262d"/>
  <circle cx="848" cy="138" r="6" fill="#ff5f57"/>
  <circle cx="872" cy="138" r="6" fill="#febc2e"/>
  <circle cx="896" cy="138" r="6" fill="#28c840"/>
  <!-- terminal content lines -->
  <text x="840" y="186" font-family="'Courier New',monospace" font-size="13" fill="#3fb950">$ </text>
  <text x="858" y="186" font-family="'Courier New',monospace" font-size="13" fill="#e6edf3">help</text>
  <text x="840" y="212" font-family="'Courier New',monospace" font-size="12" fill="#58a6ff">whoami</text>
  <text x="920" y="212" font-family="'Courier New',monospace" font-size="12" fill="#8b949e">→ Wer ist...</text>
  <text x="840" y="234" font-family="'Courier New',monospace" font-size="12" fill="#58a6ff">skills</text>
  <text x="920" y="234" font-family="'Courier New',monospace" font-size="12" fill="#8b949e">→ Tech Stack</text>
  <text x="840" y="256" font-family="'Courier New',monospace" font-size="12" fill="#58a6ff">projects</text>
  <text x="920" y="256" font-family="'Courier New',monospace" font-size="12" fill="#8b949e">→ Projekte</text>
  <text x="840" y="278" font-family="'Courier New',monospace" font-size="12" fill="#58a6ff">hire</text>
  <text x="920" y="278" font-family="'Courier New',monospace" font-size="12" fill="#8b949e">→ Anfragen</text>
