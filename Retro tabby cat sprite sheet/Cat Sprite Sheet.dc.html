<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  @keyframes idleA { from { background-position-x: 0; } to { background-position-x: -704px; } }
  @keyframes walkA { from { background-position-x: 0; } to { background-position-x: -1056px; } }
  @keyframes jupA  { from { background-position-x: 0; } to { background-position-x: -704px; } }
  @keyframes fudA  { from { background-position-x: 0; } to { background-position-x: -704px; } }
  @keyframes slpA  { from { background-position-x: 0; } to { background-position-x: -528px; } }
</style>
</helmet>
<div style="min-height:100vh; box-sizing:border-box; background:#1c1a26; padding:48px; font-family:'VT323',monospace; color:#f3ead7;">
  <div style="max-width:1080px; margin:0 auto;">
    <div style="display:flex; align-items:baseline; gap:16px; margin-bottom:6px;">
      <h1 style="margin:0; font-size:52px; letter-spacing:2px; color:#ffb751; text-shadow:3px 3px 0 #2a1a10;">ORANGE TABBY — SPRITE SHEET</h1>
    </div>
    <p style="margin:0 0 36px; font-size:22px; color:#a59b86; letter-spacing:1px;">16-bit desktop pet · 32&times;32 cells · transparent PNG · 21 frames</p>

    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; margin-bottom:44px;">
      <sc-for list="{{ anims }}" as="a" hint-placeholder-count="5">
        <div style="background:#262333; border:2px solid #3a3650; border-radius:4px; padding:18px 14px 14px; display:flex; flex-direction:column; align-items:center; gap:14px;">
          <div style="width:176px; height:176px; background-image:conic-gradient(#2f2c40 90deg,#34314699 90deg 180deg,#2f2c40 180deg 270deg,#34314699 270deg); background-size:24px 24px; border-radius:3px; display:flex; align-items:center; justify-content:center;">
            <div style="{{ a.style }}"></div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:26px; color:#ffb751; letter-spacing:1px; line-height:1;">{{ a.name }}</div>
            <div style="font-size:19px; color:#8e8470; letter-spacing:1px;">{{ a.frames }} frames</div>
          </div>
        </div>
      </sc-for>
    </div>

    <div style="font-size:24px; color:#ffb751; letter-spacing:1px; margin-bottom:12px;">FULL SHEET</div>
    <div style="background-image:conic-gradient(#2f2c40 90deg,#34314699 90deg 180deg,#2f2c40 180deg 270deg,#34314699 270deg); background-size:24px 24px; border:2px solid #3a3650; border-radius:4px; padding:8px; overflow:auto;">
      <img src="sprites/cat-spritesheet.png" alt="cat sprite sheet" style="display:block; width:100%; image-rendering:pixelated;">
    </div>
    <p style="margin:18px 0 0; font-size:20px; color:#6f6754; letter-spacing:1px;">Individual frames are in <span style="color:#a59b86;">sprites/frames/</span> as r{row}_c{col}.png</p>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const SHEET = "sprites/cat-spritesheet.png";
    const cell = 176;
    // sheet is 6x5 cells; displayed cell = 176 => bg-size 6*176 x 5*176
    const base = `width:${cell}px;height:${cell}px;background-image:url('${SHEET}');background-repeat:no-repeat;background-size:${cell*6}px ${cell*5}px;image-rendering:pixelated;`;
    const row = (r) => `background-position-y:${-r*cell}px;`;
    const mk = (r, frames, dur, kf) =>
      base + row(r) + `animation:${kf} ${dur}s steps(${frames}) infinite;`;
    return {
      anims: [
        { name: "IDLE",        frames: 4, style: mk(0, 4, 1.4, "idleA") },
        { name: "WALK RIGHT",  frames: 6, style: mk(1, 6, 0.75, "walkA") },
        { name: "JUMP UP",     frames: 4, style: mk(2, 4, 0.8, "jupA") },
        { name: "JUMP / FOOD", frames: 4, style: mk(3, 4, 0.8, "fudA") },
        { name: "SLEEP",       frames: 3, style: mk(4, 3, 1.8, "slpA") },
      ],
    };
  }
}
</script>
</body>
</html>
